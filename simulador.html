<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador MTCNA</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f4f4;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 600px;
  margin: auto;
}

h2 {
  text-align: center;
}

button {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border: none;
  background: #ddd;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #bbb;
}

.selected {
  background: #4CAF50 !important;
  color: white;
}

#timer {
  text-align: right;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>Simulador MTCNA</h2>
  <p id="timer">Tiempo: 60:00</p>

  <div id="pregunta"></div>
  <div id="opciones"></div>

  <button onclick="siguiente()">Siguiente</button>
</div>

<script>

let banco = [];
let preguntas = [];
let actual = 0;
let respuestas = [];
let tiempo = 3600;

// Cargar JSON
fetch("mtcna_bank.json")
.then(res => res.json())
.then(data => {
  banco = data;

  // Mezclar preguntas
  banco.sort(() => Math.random() - 0.5);

  // Seleccionar 25
  preguntas = banco.slice(0, 25);

  mostrar();
  timer();
});

function mostrar() {
  let p = preguntas[actual];

  document.getElementById("pregunta").innerHTML =
    "<b>" + (actual+1) + ". " + p.pregunta + "</b>";

  let html = "";

  for (let k in p.opciones) {
    let selected = respuestas[actual] == k ? "selected" : "";
    html += `<button class="${selected}" onclick="responder('${k}')">
              ${k}) ${p.opciones[k]}
            </button>`;
  }

  document.getElementById("opciones").innerHTML = html;
}

function responder(r) {
  respuestas[actual] = r;
  mostrar();
}

function siguiente() {
  if (actual < preguntas.length - 1) {
    actual++;
    mostrar();
  } else {
    resultado();
  }
}

function resultado() {
  let correctas = 0;

  preguntas.forEach((p,i)=>{
    if (respuestas[i] == p.correcta[0]) correctas++;
  });

  let porcentaje = (correctas / preguntas.length) * 100;

  document.body.innerHTML = `
    <div class="container">
      <h2>Resultado Final</h2>
      <p><b>${correctas}/${preguntas.length}</b></p>
      <p><b>${porcentaje.toFixed(2)}%</b></p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  `;
}

// Timer
function timer() {
  tiempo--;

  let m = Math.floor(tiempo / 60);
  let s = tiempo % 60;

  document.getElementById("timer").innerText =
    "Tiempo: " + m + ":" + (s < 10 ? "0" : "") + s;

  if (tiempo > 0) {
    setTimeout(timer, 1000);
  } else {
    resultado();
  }
}

</script>

</body>
</html>
